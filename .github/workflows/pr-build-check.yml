name: PR Build Check

on:
  pull_request:
    branches:
      - main
      - develop # Añade aquí otras ramas de destino de tus PRs si es necesario

jobs:
  check-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: docker/setup-buildx-action@v3 # Usamos buildx si queremos testear la compilación de Docker entera, o node normal.
        # Testear con Node.js es más rápido y detecta errores de compilación de código/TypeScript.
        # Hagámoslo con Node.js estándar.

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create temporary .env for build
        run: |
          echo "NEXT_PUBLIC_HOST_URL=http://localhost:3000" >> .env
          echo "NEXT_PUBLIC_API_BASE_URL=http://localhost:4000" >> .env

      - name: Build application
        run: npm run build
